name: CI and CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # CI-only: pytest + service Postgres on the runner. Deploy still uses secrets.DB_HOST → remote .env.
      DB_HOST: localhost
      DB_NAME: securecart
      DB_USER: postgres
      DB_PASSWORD: postgres
      SECRET_KEY: ci-test-secret-not-for-production
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: securecart
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d securecart"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install dev dependencies
        run: pip install flake8 pytest pytest-cov


      - name: Lint with flake8
        run: flake8 app.py tests --max-line-length=120

      - name: Run tests  with 70% coverage gate
        run: pytest tests/ -v --cov=app --cov-report=xml --cov-fail-under=70

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  sonarcloud:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-report

      - name: SonarQube Cloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build-and-push:
    runs-on: ubuntu-latest
    needs: [test, sonarcloud]
    permissions:
      contents: read
      packages: write

    outputs:
      image_repo: ${{ steps.image.outputs.repository }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: GHCR image name (lowercase)
        id: image
        run: echo "repository=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ steps.image.outputs.repository }}:${{ github.sha }}
            ${{ steps.image.outputs.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  scan-image:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: read

    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan image — CRITICAL blocks pipeline
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ needs.build-and-push.outputs.image_repo }}:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL'

      - name: Scan image — full report saved as artifact
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ needs.build-and-push.outputs.image_repo }}:${{ github.sha }}'
          format: 'json'
          output: 'trivy-image-report.json'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Upload image scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-report
          path: trivy-image-report.json

  scan-deps:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Scan dependencies — CRITICAL blocks pipeline
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL'

      - name: Scan dependencies — full report saved as artifact
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'json'
          output: 'trivy-deps-report.json'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Upload deps scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-deps-report
          path: trivy-deps-report.json

  deploy:
    runs-on: ubuntu-latest
    needs: [scan-image, scan-deps]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
          GIT_SHA: ${{ github.sha }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        run: |
          set -e

          echo "$SSH_KEY" > deploy_key
          chmod 600 deploy_key

          APP_DIR="/opt/teams/${TEAM_ID}/app"

          ssh -i deploy_key -o StrictHostKeyChecking=no \
            ${DEPLOY_HOST} "mkdir -p ${APP_DIR}"

          scp -i deploy_key -o StrictHostKeyChecking=no \
            scripts/deploy.sh ${DEPLOY_HOST}:~/deploy.sh

          scp -i deploy_key -o StrictHostKeyChecking=no \
            docker-compose.yml ${DEPLOY_HOST}:${APP_DIR}/docker-compose.yml

          ssh -i deploy_key -o StrictHostKeyChecking=no \
            ${DEPLOY_HOST} "umask 077; { \
              echo DB_HOST=${DB_HOST}; \
              echo DB_NAME=${DB_NAME}; \
              echo DB_USER=${DB_USER}; \
              echo DB_PASSWORD=${DB_PASSWORD}; \
              echo SECRET_KEY=${SECRET_KEY}; \
              echo APP_VERSION=${GIT_SHA}; \
              echo IMAGE_TAG=${GIT_SHA}; \
            } > ${APP_DIR}/.env"

          ssh -i deploy_key -o StrictHostKeyChecking=no \
            ${DEPLOY_HOST} "echo '${GHCR_PAT}' | docker login ghcr.io -u '${GHCR_USERNAME}' --password-stdin"

          ssh -i deploy_key -o StrictHostKeyChecking=no \
            ${DEPLOY_HOST} "TEAM_ID=${TEAM_ID} GIT_SHA=${GIT_SHA} bash ~/deploy.sh"

          rm -f deploy_key

      - name: Verify deployment
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
        run: |
          TEAM_NUM="${TEAM_ID##*-}"
          APP_PORT="80${TEAM_NUM}"
          HOST="${DEPLOY_HOST##*@}"

          curl -sf "http://${HOST}:${APP_PORT}/api/health"