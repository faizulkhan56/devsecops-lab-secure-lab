name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install dev dependencies
        run: pip install flake8 pytest

      - name: Lint with flake8
        run: flake8 app.py --max-line-length=120

      - name: Run tests
        run: pytest tests/ -v

      - name: Test secret access
        run: echo "Secret is set (not printing it!)"
        env:
          MY_SECRET: ${{ secrets.TEST_SECRET }}

      - name: Config access
        run: echo "MY_CONFIG=$MY_CONFIG"
        env:
          MY_CONFIG: ${{ vars.TEST_CONFIG }}